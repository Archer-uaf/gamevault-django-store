[flake8]
max-line-length = 88
extend-exclude =
    .git,
    .idea,
    .venv,
    */migrations/*

[mypy]
plugins = mypy_django_plugin.main
python_version = 3.12
check_untyped_defs = True
disallow_untyped_defs = True
ignore_missing_imports = True
exclude = (?x)(/migrations/)

[mypy.plugins.django-stubs]
django_settings_module = config.settings
